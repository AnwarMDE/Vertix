# Despliegue de la web (PWA) en Netlify.
# Con "base" definido, Netlify entra en web/ y construye solo:
# NO hace falta rellenar "Base directory" ni "Build command" en la UI.
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

# URL pública del backend (Render). La web la usa para llamar a la API.
[build.environment]
  VITE_API_URL = "https://vertix-dca9.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
